version: '3.8'

services:
  meeting-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meeting-bot
    restart: unless-stopped
    ports:
      - "3000:10000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=10000
    volumes:
      - recordings:/tmp/recordings
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

volumes:
  recordings:
    driver: local
